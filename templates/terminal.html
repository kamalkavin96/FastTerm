<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Terminal</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #300a24;
        overflow: hidden;
        font-family: "Ubuntu", "Cantarell", sans-serif;
      }

      /* ── GNOME-style titlebar ── */
      #titlebar {
        display: flex;
        align-items: center;
        height: 36px;
        background: linear-gradient(to bottom, #3d1433, #300a24);
        border-bottom: 1px solid #1a0614;
        padding: 0 8px;
        -webkit-app-region: drag;
        user-select: none;
      }

      #titlebar-title {
        flex: 1;
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        color: #ffffffcc;
        letter-spacing: 0.2px;
      }

      /* window control buttons (close / minimize / maximize) */
      .wc-btn {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        margin-right: 6px;
        -webkit-app-region: no-drag;
      }
      .wc-close {
        background: #fc5753;
      }
      .wc-minimize {
        background: #fdbc40;
      }
      .wc-maximize {
        background: #33c748;
      }
      .wc-close:hover {
        background: #e84040;
      }
      .wc-minimize:hover {
        background: #e0a030;
      }
      .wc-maximize:hover {
        background: #28a83a;
      }

      /* ── Tab strip ── */
      #tabstrip {
        display: flex;
        align-items: stretch;
        height: 32px;
        background: #1e0a18;
        border-bottom: 1px solid #0d0009;
        padding: 0 4px;
      }

      .tab {
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-size: 13px;
        color: #ffffff99;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
        gap: 8px;
        transition: color 0.15s;
      }
      .tab.active {
        color: #fff;
        border-bottom-color: #e95420;
        background: #300a24;
      }
      .tab:not(.active):hover {
        color: #ffffffcc;
      }

      .tab-close {
        font-size: 11px;
        color: #ffffff55;
        line-height: 1;
        border-radius: 3px;
        padding: 1px 3px;
      }
      .tab-close:hover {
        color: #fff;
        background: #ffffff22;
      }

      /* ── Terminal area ── */
      #terminal-container {
        width: 100%;
        height: calc(100vh - 68px); /* titlebar 36 + tabstrip 32 */
        background: #300a24;
        padding: 2px 0 0 2px;
      }

      /* Fix xterm canvas bleeding */
      .xterm {
        height: 100%;
      }
      .xterm-viewport {
        background: transparent !important;
      }

      /* ── GNOME-style context menu ── */
      #ctx-menu {
        display: none;
        position: fixed;
        z-index: 9000;
        background: #3c3c3c;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 0;
        min-width: 220px;
        box-shadow:
          0 6px 24px rgba(0, 0, 0, 0.55),
          0 1px 4px rgba(0, 0, 0, 0.3);
        font-family: "Ubuntu", "Cantarell", system-ui, sans-serif;
        font-size: 13.5px;
        color: #e8e8e8;
        user-select: none;
      }

      .menu-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        cursor: pointer;
        gap: 32px;
        border-radius: 2px;
        margin: 0 2px;
      }
      .menu-item:hover {
        background: #4a6fa5;
        color: #fff;
      }
      .menu-item.disabled {
        color: #888;
        cursor: default;
      }
      .menu-item.disabled:hover {
        background: transparent;
        color: #888;
      }

      .shortcut {
        font-size: 12px;
        color: #aaa;
        font-family: "Ubuntu Mono", monospace;
      }
      .menu-item:hover .shortcut {
        color: #cce;
      }

      .menu-sep {
        height: 1px;
        background: #555;
        margin: 3px 0;
      }

      /* ── Paste overlay (HTTP fallback) ── */
      #paste-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
      }
      #paste-overlay.show {
        display: flex;
      }

      #paste-box {
        background: #3c3c3c;
        border: 1px solid #666;
        border-radius: 8px;
        padding: 20px 24px 16px;
        width: 380px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        font-family: "Ubuntu", system-ui, sans-serif;
        color: #e8e8e8;
      }
      #paste-box h3 {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        color: #fff;
      }
      #paste-box p {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 10px;
      }
      #paste-textarea {
        width: 100%;
        height: 80px;
        background: #1e1e1e;
        border: 1px solid #555;
        border-radius: 4px;
        color: #e8e8e8;
        font-family: "Ubuntu Mono", "Fira Code", monospace;
        font-size: 13px;
        padding: 8px;
        resize: none;
        outline: none;
      }
      #paste-textarea:focus {
        border-color: #e95420;
      }
      #paste-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }
      .paste-btn {
        padding: 6px 20px;
        border-radius: 4px;
        border: 1px solid #666;
        font-size: 13px;
        cursor: pointer;
        background: #555;
        color: #e8e8e8;
        font-family: "Ubuntu", sans-serif;
      }
      .paste-btn:hover {
        background: #666;
      }
      .paste-btn.primary {
        background: #e95420;
        border-color: #e95420;
        color: #fff;
      }
      .paste-btn.primary:hover {
        background: #c74110;
      }
    </style>
  </head>
  <body>
    <!-- GNOME titlebar -->
    <div id="titlebar">
      <button class="wc-btn wc-close" title="Close"></button>
      <button class="wc-btn wc-minimize" title="Minimize"></button>
      <button class="wc-btn wc-maximize" title="Maximize"></button>
      <div id="titlebar-title">Terminal</div>
    </div>

    <!-- Tab strip -->
    <div id="tabstrip">
      <div class="tab active" id="tab1">
        <span id="tab1-label">bash</span>
        <span class="tab-close">&#x2715;</span>
      </div>
    </div>

    <!-- Terminal -->
    <div id="terminal-container"></div>

    <!-- Context menu — mirrors GNOME Terminal exactly -->
    <div id="ctx-menu">
      <div class="menu-item" id="ctx-open-tab">
        <span>Open Tab</span>
        <span class="shortcut">Ctrl+Shift+T</span>
      </div>
      <div class="menu-sep"></div>
      <div class="menu-item" id="ctx-copy">
        <span>Copy</span>
        <span class="shortcut">Ctrl+Shift+C</span>
      </div>
      <div class="menu-item" id="ctx-paste">
        <span>Paste</span>
        <span class="shortcut">Ctrl+Shift+V</span>
      </div>
      <div class="menu-item" id="ctx-paste-selection">
        <span>Paste Selection</span>
        <span class="shortcut"></span>
      </div>
      <div class="menu-sep"></div>
      <div class="menu-item" id="ctx-select-all">
        <span>Select All</span>
        <span class="shortcut">Ctrl+Shift+A</span>
      </div>
      <div class="menu-sep"></div>
      <div class="menu-item" id="ctx-clear">
        <span>Reset and Clear</span>
        <span class="shortcut"></span>
      </div>
      <div class="menu-item" id="ctx-zoom-in">
        <span>Zoom In</span>
        <span class="shortcut">Ctrl++</span>
      </div>
      <div class="menu-item" id="ctx-zoom-out">
        <span>Zoom Out</span>
        <span class="shortcut">Ctrl+-</span>
      </div>
      <div class="menu-item" id="ctx-zoom-reset">
        <span>Normal Size</span>
        <span class="shortcut">Ctrl+0</span>
      </div>
    </div>

    <!-- Paste overlay (HTTP fallback only) -->
    <div id="paste-overlay">
      <div id="paste-box">
        <h3>Paste</h3>
        <p>Press <strong>Ctrl+V</strong> in the box below, then click Paste.</p>
        <textarea
          id="paste-textarea"
          placeholder="Paste here…"
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <div id="paste-actions">
          <button class="paste-btn" id="paste-cancel">Cancel</button>
          <button class="paste-btn primary" id="paste-send">Paste</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        /* ─── Terminal init ───────────────────────────────────── */
        const term = new Terminal({
          cursorBlink: true,
          convertEol: true,
          fontSize: 14,
          lineHeight: 1.2,
          letterSpacing: 0,
          fontFamily: "'Ubuntu Mono','Fira Code','DejaVu Sans Mono',monospace",
          allowProposedApi: true,
          scrollback: 10000,
          rightClickSelectsWord: false,
          /* Exact Ubuntu/GNOME Terminal Tango palette */
          theme: {
            background: "#300a24",
            foreground: "#ffffff",
            cursor: "#ffffff",
            cursorAccent: "#300a24",
            selectionBackground: "rgba(255,255,255,0.3)",
            /* Normal */
            black: "#2e3436",
            red: "#cc0000",
            green: "#4e9a06",
            yellow: "#c4a000",
            blue: "#3465a4",
            magenta: "#75507b",
            cyan: "#06989a",
            white: "#d3d7cf",
            /* Bright */
            brightBlack: "#555753",
            brightRed: "#ef2929",
            brightGreen: "#8ae234",
            brightYellow: "#fce94f",
            brightBlue: "#729fcf",
            brightMagenta: "#ad7fa8",
            brightCyan: "#34e2e2",
            brightWhite: "#eeeeec",
          },
        });

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        term.open(document.getElementById("terminal-container"));
        fitAddon.fit();
        term.focus();

        /* ─── WebSocket ──────────────────────────────────────── */
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const isSecure = location.protocol === "https:";
        let socket = null;

        function send(data) {
          if (socket && socket.readyState === WebSocket.OPEN) socket.send(data);
        }

        function sendResize() {
          send(
            JSON.stringify({
              type: "resize",
              cols: term.cols,
              rows: term.rows,
            }),
          );
        }

        function updateTitle(cwd) {
          const label = cwd || "bash";
          document.getElementById("tab1-label").textContent = label;
          document.getElementById("titlebar-title").textContent =
            label + " — Terminal";
          document.title = label + " — Terminal";
        }

        function connect() {
          socket = new WebSocket(proto + "//" + location.host + "/terminal/ws");
          socket.onopen = () => {
            term.write("\r\n\x1b[32;1mConnected\x1b[0m\r\n");
            sendResize();
          };
          socket.onmessage = (e) => term.write(e.data);
          socket.onclose = () => {
            term.write(
              "\r\n\x1b[31mDisconnected \xe2\x80\x94 reconnecting in 3s\xe2\x80\xa6\x1b[0m\r\n",
            );
            setTimeout(connect, 3000);
          };
          socket.onerror = () => socket.close();
        }
        connect();

        /* ─── Resize ─────────────────────────────────────────── */
        new ResizeObserver(() => {
          fitAddon.fit();
          sendResize();
        }).observe(document.getElementById("terminal-container"));
        window.addEventListener("resize", () => {
          fitAddon.fit();
          sendResize();
        });

        /* ─── Clipboard ──────────────────────────────────────── */
        async function clipWrite(text) {
          if (isSecure && navigator.clipboard?.writeText) {
            try {
              await navigator.clipboard.writeText(text);
              return;
            } catch (_) {}
          }
          const ta = Object.assign(document.createElement("textarea"), {
            value: text,
          });
          Object.assign(ta.style, {
            position: "fixed",
            top: "-9999px",
            opacity: "0",
          });
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
          } catch (_) {}
          document.body.removeChild(ta);
        }

        /* Paste overlay (keyboard shortcut fallback on HTTP) */
        const overlay = document.getElementById("paste-overlay");
        const pasteTA = document.getElementById("paste-textarea");
        let _pasteResolve = null;

        function showPasteOverlay() {
          return new Promise((res) => {
            _pasteResolve = res;
            pasteTA.value = "";
            overlay.classList.add("show");
            setTimeout(() => pasteTA.focus(), 60);
          });
        }
        function closePasteOverlay(ok) {
          const t = ok ? pasteTA.value : "";
          overlay.classList.remove("show");
          if (_pasteResolve) {
            _pasteResolve(t);
            _pasteResolve = null;
          }
          term.focus();
        }
        document.getElementById("paste-cancel").onclick = () =>
          closePasteOverlay(false);
        document.getElementById("paste-send").onclick = () =>
          closePasteOverlay(true);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) closePasteOverlay(false);
        });
        pasteTA.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            closePasteOverlay(true);
          }
          if (e.key === "Escape") closePasteOverlay(false);
        });

        /* nativePaste — hidden textarea trick, works on HTTP without any dialog */
        function nativePaste() {
          return new Promise((res) => {
            const ta = document.createElement("textarea");
            Object.assign(ta.style, {
              position: "fixed",
              top: "-9999px",
              left: "-9999px",
              opacity: "0",
              width: "2px",
              height: "2px",
              fontSize: "1px",
            });
            document.body.appendChild(ta);
            ta.focus();
            requestAnimationFrame(() => {
              document.execCommand("paste");
              const t = ta.value;
              document.body.removeChild(ta);
              term.focus();
              res(t);
            });
          });
        }

        /* clipRead — for keyboard shortcut paste; shows overlay on HTTP */
        async function clipRead() {
          if (isSecure && navigator.clipboard?.readText) {
            try {
              return await navigator.clipboard.readText();
            } catch (_) {}
          }
          return await showPasteOverlay();
        }

        /* copySelection */
        function copySelection() {
          if (!term.hasSelection()) return false;
          clipWrite(term.getSelection());
          term.clearSelection();
          return true;
        }

        /* paste via keyboard shortcut */
        async function paste() {
          const t = await clipRead();
          if (t) send(t);
        }

        /* pasteNow — right-click / middle-click; never shows overlay */
        async function pasteNow() {
          if (isSecure && navigator.clipboard?.readText) {
            try {
              const t = await navigator.clipboard.readText();
              if (t) {
                send(t);
                return;
              }
            } catch (_) {}
          }
          const t = await nativePaste();
          if (t) send(t);
        }

        /* ─── Zoom helpers ───────────────────────────────────── */
        function zoomIn() {
          term.options.fontSize = Math.min(term.options.fontSize + 1, 36);
          fitAddon.fit();
        }
        function zoomOut() {
          term.options.fontSize = Math.max(term.options.fontSize - 1, 6);
          fitAddon.fit();
        }
        function zoomReset() {
          term.options.fontSize = 14;
          fitAddon.fit();
        }

        /* ─── Keyboard handler ───────────────────────────────── */
        term.attachCustomKeyEventHandler((e) => {
          if (e.type !== "keydown") return true;

          const ctrl = e.ctrlKey;
          const shift = e.shiftKey;
          const key = e.key.toLowerCase();

          /* Copy — Ctrl+C only when text selected (else send SIGINT as normal) */
          if (ctrl && !shift && key === "c" && term.hasSelection()) {
            copySelection();
            e.preventDefault();
            return false;
          }
          /* Ctrl+Shift+C */
          if (ctrl && shift && key === "c") {
            copySelection();
            e.preventDefault();
            return false;
          }
          /* Ctrl+Insert */
          if (ctrl && e.code === "Insert") {
            copySelection();
            e.preventDefault();
            return false;
          }

          /* Paste — Ctrl+Shift+V */
          if (ctrl && shift && key === "v") {
            paste();
            e.preventDefault();
            return false;
          }
          /* Shift+Insert */
          if (shift && e.code === "Insert") {
            paste();
            e.preventDefault();
            return false;
          }

          /* Select all */
          if (ctrl && shift && key === "a") {
            term.selectAll();
            e.preventDefault();
            return false;
          }

          /* New tab (visual only — open same WS in new browser tab) */
          if (ctrl && shift && key === "t") {
            window.open(location.href, "_blank");
            e.preventDefault();
            return false;
          }

          /* Clear */
          if (ctrl && shift && key === "k") {
            term.clear();
            e.preventDefault();
            return false;
          }
          if (ctrl && key === "l") {
            /* pass Ctrl+L through to bash (clear screen) but also clear xterm scrollback */
            send("\x0c");
            e.preventDefault();
            return false;
          }

          /* Zoom */
          if (ctrl && (e.key === "=" || e.key === "+")) {
            zoomIn();
            e.preventDefault();
            return false;
          }
          if (ctrl && e.key === "-") {
            zoomOut();
            e.preventDefault();
            return false;
          }
          if (ctrl && e.key === "0") {
            zoomReset();
            e.preventDefault();
            return false;
          }

          /* Scroll */
          if (ctrl && shift && e.key === "ArrowUp") {
            term.scrollLines(-1);
            e.preventDefault();
            return false;
          }
          if (ctrl && shift && e.key === "ArrowDown") {
            term.scrollLines(1);
            e.preventDefault();
            return false;
          }
          if (ctrl && shift && e.key === "PageUp") {
            term.scrollPages(-1);
            e.preventDefault();
            return false;
          }
          if (ctrl && shift && e.key === "PageDown") {
            term.scrollPages(1);
            e.preventDefault();
            return false;
          }
          if (ctrl && shift && e.key === "Home") {
            term.scrollToTop();
            e.preventDefault();
            return false;
          }
          if (ctrl && shift && e.key === "End") {
            term.scrollToBottom();
            e.preventDefault();
            return false;
          }

          return true;
        });

        /* PTY input */
        term.onData((d) => send(d));

        /* ─── Context menu ───────────────────────────────────── */
        const ctxMenu = document.getElementById("ctx-menu");

        function showMenu(x, y) {
          const hasSel = term.hasSelection();
          const copyEl = document.getElementById("ctx-copy");
          const pasteSelEl = document.getElementById("ctx-paste-selection");
          copyEl.classList.toggle("disabled", !hasSel);
          pasteSelEl.classList.toggle("disabled", !hasSel);

          ctxMenu.style.display = "block";
          const mw = ctxMenu.offsetWidth || 220;
          const mh = ctxMenu.offsetHeight || 240;
          ctxMenu.style.left = (x + mw > innerWidth ? x - mw : x) + "px";
          ctxMenu.style.top = (y + mh > innerHeight ? y - mh : y) + "px";
        }
        function hideMenu() {
          ctxMenu.style.display = "none";
        }

        document.addEventListener("click", hideMenu);
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") hideMenu();
        });
        term.element.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          showMenu(e.clientX, e.clientY);
        });

        function menuAction(id, fn) {
          document.getElementById(id).addEventListener("click", async (e) => {
            e.stopPropagation();
            hideMenu();
            await fn();
            term.focus();
          });
        }

        menuAction("ctx-open-tab", () => {
          window.open(location.href, "_blank");
        });
        menuAction("ctx-copy", () => copySelection());
        menuAction("ctx-paste", () => pasteNow());
        menuAction("ctx-paste-selection", () => {
          /* Paste Selection = paste what is currently selected in terminal */
          if (term.hasSelection()) send(term.getSelection());
        });
        menuAction("ctx-select-all", () => term.selectAll());
        menuAction("ctx-clear", () => {
          term.reset();
          send("\x0c");
        });
        menuAction("ctx-zoom-in", () => zoomIn());
        menuAction("ctx-zoom-out", () => zoomOut());
        menuAction("ctx-zoom-reset", () => zoomReset());

        /* ─── Middle-click paste ─────────────────────────────── */
        term.element.addEventListener("mousedown", async (e) => {
          if (e.button !== 1) return;
          e.preventDefault();
          await pasteNow();
        });

        /* ─── Click → focus ──────────────────────────────────── */
        term.element.addEventListener("click", (e) => {
          if (!ctxMenu.contains(e.target)) {
            hideMenu();
            term.focus();
          }
        });

        /* ─── Titlebar buttons (cosmetic) ───────────────────── */
        document.querySelector(".wc-close").onclick = () => window.close();
        document.querySelector(".wc-minimize").onclick = () => {};
        document.querySelector(".wc-maximize").onclick = () => {
          if (!document.fullscreenElement)
            document.documentElement.requestFullscreen?.();
          else document.exitFullscreen?.();
        };
      })();
    </script>
  </body>
</html>
